problem_name: dtlz1
n_var: 10
n_obj: 2

n_gen: 100
pop_size: 100

# Bias-Variance Experiment: 30 samplings / 30 trainings.
n_runs: 30

# EA optimization seeds use Python range semantics: [ea_seed_start, ea_seed_end).
# The default below runs seeds 1..30.
ea_seed_start: 1
ea_seed_end: 31

no_plot: true
run_ea: false
run_bias_variance_ea: true

output_dir: outputs/exp1_gpr_rbf/dtlz1

bias_variance_configs:
  - model_type: high_bias
    lengthscale_weight: 10.0
  - model_type: middle_bias
    lengthscale_weight: 5.0
  - model_type: low_bias
    lengthscale_weight: 2.0
  - model_type: high_variance
    lengthscale_weight: 0.1
  - model_type: middle_variance
    lengthscale_weight: 0.2
  - model_type: low_variance
    lengthscale_weight: 0.5
